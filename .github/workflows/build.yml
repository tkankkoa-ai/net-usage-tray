name: Build C++ EXE

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build
      run: msbuild *.vcxproj /p:Configuration=Release /p:Platform=x64

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: NetTray-EXE
        path: x64/Release/
