name: Build C++ EXE

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Build EXE
      run: |
        cl /std:c++17 /EHsc /O2 main.cpp /link advapi32.lib tdh.lib shell32.lib

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: NetTray-EXE
        path: main.exe
